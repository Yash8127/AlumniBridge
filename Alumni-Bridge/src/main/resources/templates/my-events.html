<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>My Events</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border-radius: 12px;
}
</style>
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container">

		<h3 class="mb-4">🎟️ My Registered Events</h3>

		<div class="row g-4">

			<div class="col-md-4" th:each="reg : ${registrations}">
				<div class="card shadow p-3">

					<h5 th:text="${reg.event.title}"></h5>

					<p class="text-muted" th:text="${reg.event.description}"></p>

					<p>
						📍 <span th:text="${reg.event.location}"></span><br> 📅 <span
							th:text="${reg.event.date}"></span>
					</p>

					<span class="badge bg-success">Registered</span>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
