<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Profile</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
}

.card {
	border-radius: 12px;
	border: none;
}
</style>
</head>

<body>

	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container" style="margin-top: 90px;">

		<div class="row justify-content-center">
			<div class="col-md-6">

				<div class="card shadow-lg p-4 text-center">

					<img th:src="@{'/' + ${user.profileImage}}" width="120"
						height="120" class="rounded-circle"
						onerror="this.src='https://via.placeholder.com/120'">

					<h4 class="mb-3">My Profile</h4>

					<div th:if="${profile != null}">
						<p>
							<b>Skills:</b> <span th:text="${profile.skills}"></span>
						</p>
						<p>
							<b>Company:</b> <span th:text="${profile.company}"></span>
						</p>
						<p>
							<b>Experience:</b> <span th:text="${profile.experience}"></span>
						</p>
						<p>
							<b>Bio:</b> <span th:text="${profile.bio}"></span>
						</p>
					</div>

					<div th:if="${profile == null}">
						<p class="text-danger">No profile found</p>
					</div>

					<a href="/edit-profile" class="btn btn-primary mt-3">Edit
						Profile</a>

				</div>

			</div>
		</div>

	</div>

</body>
</html>
