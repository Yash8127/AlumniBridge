<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Manage Users</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border: none;
	border-radius: 15px;
}
</style>
</head>

<body>

	<!-- 🔥 ADMIN NAVBAR -->
	<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

	<div class="container">

		<h3 class="mb-4">👥 Manage Users</h3>

		<div class="card shadow p-3">

			<table class="table table-hover align-middle">
				<thead class="table-dark">
					<tr>
						<th>Name</th>
						<th>Email</th>
						<th>Role</th>
						<th>Status</th>
						<th class="text-center">Actions</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="u : ${users}">

						<td th:text="${u.name}"></td>
						<td th:text="${u.email}"></td>
						<td><span class="badge bg-secondary" th:text="${u.role}"></span>
						</td>

						<td><span th:if="${u.blocked==true}" class="badge bg-danger">Blocked</span>
							<span th:if="${u.blocked==false}" class="badge bg-success">Active</span>
						</td>

						<td class="text-center"><a
							th:href="@{'/admin/toggle-block/' + ${u.id}}"
							class="btn btn-warning btn-sm">Block/Unblock</a> <a
							th:href="@{'/admin/delete-user/' + ${u.id}}"
							class="btn btn-danger btn-sm">Delete</a></td>

					</tr>
				</tbody>

			</table>

		</div>

	</div>

</body>
</html>
