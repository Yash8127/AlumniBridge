<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Manage Events</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border: none;
	border-radius: 15px;
}
</style>
</head>

<body>

	<!-- 🔥 ADMIN NAVBAR -->
	<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

	<div class="container">

		<h3 class="mb-4">📅 Manage Events</h3>

		<div class="row g-4">

			<div class="col-md-4" th:each="event : ${events}">
				<div class="card shadow p-3">

					<h5 th:text="${event.title}"></h5>

					<p th:text="${event.description}"></p>

					<p>
						📍 <span th:text="${event.location}"></span><br> 📅 <span
							th:text="${event.date}"></span>
					</p>

					<p class="text-muted">
						Created by: <span th:text="${event.createdBy.name}"></span>
					</p>

					<a th:href="@{'/admin/delete-event/' + ${event.id}}"
						class="btn btn-danger w-100">Delete</a>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
