<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>User Profile</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
}

.card {
	border-radius: 12px;
	border: none;
}

.profile-img {
	width: 100px;
	height: 100px;
	border-radius: 50%;
	object-fit: cover;
}
</style>
</head>

<body>

	<!-- NAVBAR -->
	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container" style="margin-top: 90px;">

		<div class="row justify-content-center">
			<div class="col-md-6">

				<div class="card shadow-lg p-4 text-center">

					<!-- PROFILE IMAGE -->
					<img src="https://via.placeholder.com/100" class="profile-img mb-3">

					<!-- BASIC INFO -->
					<h4 th:text="${user.name}"></h4>
					<p class="text-muted" th:text="${user.email}"></p>

					<span class="badge bg-secondary mb-3" th:text="${user.role}"></span>

					<hr>

					<!-- PROFILE DETAILS -->
					<div th:if="${user.profile != null}">

						<p>
							<b>Skills:</b> <span th:text="${user.profile.skills}"></span>
						</p>

						<p>
							<b>Company:</b> <span th:text="${user.profile.company}"></span>
						</p>

						<p>
							<b>Experience:</b> <span th:text="${user.profile.experience}"></span>
						</p>

						<p>
							<b>Bio:</b> <span th:text="${user.profile.bio}"></span>
						</p>

					</div>

					<div th:if="${user.profile == null}">
						<p class="text-danger">No profile details available</p>
					</div>

					<!-- ACTION BUTTONS -->
					<div class="mt-3">

						<!-- ✅ SHOW ONLY IF NOT SAME USER -->
						<a th:if="${currentUser.id != user.id}"
							th:href="@{'/chat/' + ${user.id}}" class="btn btn-primary me-2">
							💬 Message </a> <a href="/alumni" class="btn btn-outline-secondary">
							⬅ Back </a>

					</div>

				</div>

			</div>
		</div>

	</div>

</body>
</html>
