<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Chat</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.chat-box {
	height: 400px;
	overflow-y: auto;
	background: white;
	padding: 15px;
	border-radius: 12px;
}

/* MESSAGE ALIGNMENT */
.msg-left {
	text-align: left;
	margin-bottom: 10px;
}

.msg-right {
	text-align: right;
	margin-bottom: 10px;
}

/* CHAT BUBBLES */
.bubble-left {
	background: #e9ecef;
	padding: 10px 14px;
	border-radius: 12px;
	display: inline-block;
	max-width: 70%;
}

.bubble-right {
	background: #0d6efd;
	color: white;
	padding: 10px 14px;
	border-radius: 12px;
	display: inline-block;
	max-width: 70%;
}

/* TIME + STATUS */
.time {
	font-size: 12px;
	color: gray;
}

.status {
	font-size: 11px;
	color: gray;
}
</style>
</head>

<body>

	<!-- NAVBAR -->
	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container col-md-6">

		<div class="card shadow p-3">

			<!-- HEADER -->
			<h5 th:text="'Chat with ' + ${receiver.name}"></h5>

			<!-- CHAT AREA -->
			<div class="chat-box mt-3 mb-3">

				<div th:each="msg : ${messages}">

					<!-- ✅ RECEIVED MESSAGE -->
					<div th:if="${msg.sender.id == receiver.id}" class="msg-left">

						<div class="bubble-left" th:text="${msg.content}"></div>

						<br> <span class="time"
							th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></span>

					</div>

					<!-- ✅ SENT MESSAGE -->
					<div th:if="${msg.sender.id != receiver.id}" class="msg-right">

						<div class="bubble-right" th:text="${msg.content}"></div>

						<br> <span class="time"
							th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></span> <br>

						<!-- ✅ SHOW STATUS ONLY FOR SENT -->
						<span class="status"> <span th:if="${msg.seen}">✔✔
								Seen</span> <span th:if="${!msg.seen}">✔ Sent</span>
						</span>

					</div>

				</div>

			</div>

			<!-- INPUT -->
			<form action="/send-message" method="post">

				<input type="hidden" name="receiverId" th:value="${receiver.id}">

				<div class="input-group">
					<input type="text" name="content" class="form-control"
						placeholder="Type message..." required>

					<button class="btn btn-primary">Send</button>
				</div>

			</form>

		</div>

	</div>

	<!-- ✅ AUTO SCROLL FIX -->
	<script>
		const chatBox = document.querySelector('.chat-box');
		if (chatBox) {
			chatBox.scrollTop = chatBox.scrollHeight;
		}
	</script>

	<!-- BOOTSTRAP -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
