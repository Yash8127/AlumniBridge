<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
.navbar-brand {
	font-size: 1.4rem;
	letter-spacing: 1px;
}

.nav-link {
	position: relative;
	margin-right: 10px;
	transition: 0.3s;
}

.nav-link:hover {
	color: #0d6efd !important;
}

/* underline animation */
.nav-link::after {
	content: "";
	position: absolute;
	width: 0%;
	height: 2px;
	bottom: 0;
	left: 0;
	background-color: #0d6efd;
	transition: 0.3s;
}

.nav-link:hover::after {
	width: 100%;
}

.logout-btn {
	border-radius: 20px;
	padding: 5px 15px;
}
</style>
</head>

<body>

	<nav
		class="navbar navbar-expand-lg navbar-dark bg-dark shadow fixed-top"
		th:fragment="navbar">

		<div class="container">

			<!-- LOGO -->
			<a class="navbar-brand fw-bold" href="/dashboard"> 🎓 Alumni
				Bridge </a>

			<!-- ✅ TOGGLE BUTTON -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarContent"
				aria-controls="navbarContent" aria-expanded="false"
				aria-label="Toggle navigation">

				<span class="navbar-toggler-icon"></span>
			</button>

			<!-- ✅ COLLAPSIBLE MENU -->
			<div class="collapse navbar-collapse" id="navbarContent">

				<ul class="navbar-nav ms-auto align-items-center">

					<li class="nav-item"><a class="nav-link" href="/dashboard">🏠
							Dashboard</a></li>

					<li class="nav-item"><a class="nav-link" href="/alumni">👥
							Alumni</a></li>
							
					<li class="nav-item"><a class="nav-link" href="/jobs">💼
							Jobs</a></li>

					<li class="nav-item"><a class="nav-link" href="/messages">💬
							Messages</a></li>
							
					<li class="nav-item"><a class="nav-link"
						href="/my-applications">📄 Applications</a></li>
						
					<li class="nav-item"><a class="nav-link" href="/profile">👤
							Profile</a></li>

					<li class="nav-item ms-3"><a
						class="btn btn-danger btn-sm logout-btn" href="/logout">
							Logout </a></li>

				</ul>

			</div>

		</div>

	</nav>

</body>
</html>
