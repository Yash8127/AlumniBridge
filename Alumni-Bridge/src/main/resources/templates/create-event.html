<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Create Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container col-md-6" style="margin-top:90px;">

    <div class="card p-4 shadow">

        <h3>Create Event</h3>

        <form action="/save-event" method="post">

            <input type="text" name="title" class="form-control mb-2" placeholder="Title" required>

            <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

            <input type="text" name="location" class="form-control mb-2" placeholder="Location">

            <input type="date" name="date" class="form-control mb-3">

            <button class="btn btn-primary w-100">Create</button>

        </form>

    </div>

</div>

</body>
</html>
