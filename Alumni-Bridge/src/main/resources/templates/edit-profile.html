<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Profile</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border-radius: 12px;
	border: none;
}
</style>
</head>

<body>

	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container col-md-6">

		<div class="card shadow p-4">

			<h3 class="mb-3">Edit Profile</h3>

			<!-- ✅ IMPORTANT FIX -->
			<form th:action="@{/save-profile}" method="post"
				th:object="${profile}" enctype="multipart/form-data">

				<input type="text" th:field="*{skills}" class="form-control mb-2"
					placeholder="Skills"> <input type="text"
					th:field="*{company}" class="form-control mb-2"
					placeholder="Company"> <input type="text"
					th:field="*{experience}" class="form-control mb-2"
					placeholder="Experience">

				<textarea th:field="*{bio}" class="form-control mb-2"
					placeholder="Bio"></textarea>

				<!-- IMAGE UPLOAD -->
				<input type="file" name="image" class="form-control mb-3">

				<button class="btn btn-success w-100">Save Profile</button>

			</form>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
