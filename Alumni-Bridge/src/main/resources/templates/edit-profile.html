<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Profile</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
}

.card {
	border-radius: 12px;
	border: none;
}
</style>
</head>

<body>

	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container" style="margin-top: 90px;">

		<div class="row justify-content-center">
			<div class="col-md-6">

				<div class="card shadow-lg p-4">

					<h4 class="text-center mb-4">Edit Profile</h4>

					<form th:action="@{/save-profile}" method="post"
						th:object="${profile}">

						<div class="mb-3">
							<label>Skills</label> <input type="text" class="form-control"
								th:field="*{skills}">
						</div>

						<div class="mb-3">
							<label>Company</label> <input type="text" class="form-control"
								th:field="*{company}">
						</div>

						<div class="mb-3">
							<label>Experience</label> <input type="text" class="form-control"
								th:field="*{experience}">
						</div>

						<div class="mb-3">
							<label>Bio</label>
							<textarea class="form-control" th:field="*{bio}"></textarea>
						</div>

						<button class="btn btn-success w-100">Save Profile</button>

					</form>

				</div>

			</div>
		</div>

	</div>

</body>
</html>
