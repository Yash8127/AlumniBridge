<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    padding-top: 70px;
}

.welcome-box {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: white;
    border-radius: 15px;
    padding: 20px;
}

.card {
    border: none;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.stat-card {
    text-align: center;
    padding: 20px;
}

.stat-number {
    font-size: 28px;
    font-weight: bold;
}

.icon {
    font-size: 28px;
}
</style>

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <!-- 🔹 WELCOME -->
    <div class="welcome-box mb-4 shadow">
        <h3>
            Welcome, <span th:text="${session.loggedUser.name}"></span>
            <span th:if="${session.loggedUser.role == 'STUDENT'}">🎓</span>
            <span th:if="${session.loggedUser.role == 'ALUMNI'}">👨‍💼</span>
        </h3>
        <p>Connect, explore opportunities, and grow your network.</p>
    </div>

    <!-- 🔹 STATS -->
    <div class="row g-4 mb-4">

        <div class="col-md-3">
            <div class="card shadow stat-card">
                <div class="icon">👥</div>
                <div class="stat-number" th:text="${alumniCount}">0</div>
                <p>Alumni</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow stat-card">
                <div class="icon">💼</div>
                <div class="stat-number" th:text="${jobCount}">0</div>
                <p th:text="${session.loggedUser.role == 'STUDENT'} ? 'Available Jobs' : 'Jobs Posted'"></p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow stat-card">
                <div class="icon">📄</div>
                <div class="stat-number" th:text="${applicationCount}">0</div>
                <p>Applications</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow stat-card">
                <div class="icon">📅</div>
                <div class="stat-number" th:text="${eventCount}">0</div>
                <p>Events</p>
            </div>
        </div>

    </div>

    <!-- 🔹 STUDENT ACTIONS -->
    <div class="row g-4" th:if="${session.loggedUser.role == 'STUDENT'}">

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <div class="icon">💼</div>
                <h5>Find Jobs</h5>
                <a href="/jobs" class="btn btn-outline-success btn-sm">Explore</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <div class="icon">👥</div>
                <h5>Alumni Network</h5>
                <a href="/alumni" class="btn btn-outline-primary btn-sm">Connect</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <div class="icon">📅</div>
                <h5>Events</h5>
                <a href="/events" class="btn btn-outline-info btn-sm">View</a>
            </div>
        </div>

    </div>

    <!-- 🔹 ALUMNI / ADMIN ACTIONS -->
    <div class="row g-4"
         th:if="${session.loggedUser.role == 'ALUMNI' or session.loggedUser.role == 'ADMIN'}">

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <div class="icon">➕</div>
                <h5>Post Job</h5>
                <a href="/post-job" class="btn btn-outline-primary btn-sm">Create</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <div class="icon">📅</div>
                <h5>Create Event</h5>
                <a href="/create-event" class="btn btn-outline-info btn-sm">Create</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <div class="icon">👥</div>
                <h5>View Alumni</h5>
                <a href="/alumni" class="btn btn-outline-success btn-sm">Explore</a>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>F
