<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Panel</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

/* cards */
.card {
	border: none;
	border-radius: 15px;
	transition: 0.3s;
}

.card:hover {
	transform: translateY(-5px);
}

.icon {
	font-size: 30px;
}

/* navbar */
.admin-navbar {
	background: #212529;
}
</style>

</head>

<body>

	<!-- 🔥 ADMIN NAVBAR -->
	<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

	<!-- 🔹 CONTENT -->
	<div class="container">

		<h3 class="mb-4">👨‍💼 Admin Dashboard</h3>

		<div class="row g-4">

			<div class="col-md-4">
				<div class="card shadow p-4 text-center">
					<div class="icon">👥</div>
					<h5 class="mt-2">Manage Users</h5>
					<a href="/admin/users" class="btn btn-outline-primary btn-sm">Open</a>
				</div>
			</div>

			<div class="col-md-4">
				<div class="card shadow p-4 text-center">
					<div class="icon">💼</div>
					<h5 class="mt-2">Manage Jobs</h5>
					<a href="/admin/jobs" class="btn btn-outline-success btn-sm">Open</a>
				</div>
			</div>

			<div class="col-md-4">
				<div class="card shadow p-4 text-center">
					<div class="icon">📅</div>
					<h5 class="mt-2">Manage Events</h5>
					<a href="/admin/events" class="btn btn-outline-info btn-sm">Open</a>
				</div>
			</div>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
