<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Manage Jobs</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border: none;
	border-radius: 15px;
}
</style>
</head>

<body>

	<!-- 🔥 ADMIN NAVBAR -->
	<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

	<div class="container">

		<h3 class="mb-4">💼 Manage Jobs</h3>

		<div class="row g-4">

			<div class="col-md-4" th:each="job : ${jobs}">
				<div class="card shadow p-3">

					<h5 th:text="${job.title}"></h5>

					<p>
						<b>Company:</b> <span th:text="${job.company}"></span>
					</p>
					<p>
						<b>Location:</b> <span th:text="${job.location}"></span>
					</p>

					<p class="text-muted">
						Posted by: <span th:text="${job.postedBy.name}"></span>
					</p>

					<a th:href="@{'/admin/delete-job/' + ${job.id}}"
						class="btn btn-danger w-100">Delete</a>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
