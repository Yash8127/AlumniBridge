<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Jobs</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border-radius: 12px;
	transition: 0.3s;
}

.card:hover {
	transform: translateY(-5px);
}
</style>

</head>

<body>

	<!-- ✅ FIXED NAVBAR -->
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h3>💼 Jobs</h3>

			<!-- ROLE BASED POST -->
			<a
				th:if="${session.loggedUser.role == 'ALUMNI' or session.loggedUser.role == 'ADMIN'}"
				href="/post-job" class="btn btn-primary"> + Post Job </a>
		</div>

		<div class="row g-4">

			<div class="col-md-4" th:each="job : ${jobs}">
				<div class="card shadow p-3">

					<!-- TITLE -->
					<h5 th:text="${job.title}"></h5>

					<!-- DETAILS -->
					<p class="mb-1">
						<b>🏢 Company:</b> <span th:text="${job.company}"></span>
					</p>

					<p class="mb-1">
						<b>📍 Location:</b> <span th:text="${job.location}"></span>
					</p>

					<!-- 🔥 CLICKABLE POSTED BY -->
					<p class="text-muted mb-2">
						👤 Posted by: <a th:href="@{'/view-user/' + ${job.postedBy.id}}"
							class="fw-bold text-primary text-decoration-none"> <span
							th:text="${job.postedBy.name}"></span>
						</a>
					</p>

					<!-- APPLY BUTTON -->
					<div
						th:if="${!@applicationService.alreadyApplied(session.loggedUser, job)}">
						<a th:href="@{'/apply/' + ${job.id}}"
							class="btn btn-primary w-100"> Apply </a>
					</div>

					<div
						th:if="${@applicationService.alreadyApplied(session.loggedUser, job)}">
						<button class="btn btn-success w-100" disabled>✔ Applied
						</button>
					</div>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
