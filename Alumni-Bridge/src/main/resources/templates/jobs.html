<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Jobs</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body>

	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container" style="margin-top: 90px;">

		<h2 class="mb-4 text-center">💼 Jobs</h2>

		<a href="/post-job" class="btn btn-success mb-3">Post Job</a>

		<div class="row">

			<div class="col-md-4 mb-4" th:each="job : ${jobs}">
				<div class="card p-3 shadow">

					<h5 th:text="${job.title}"></h5>
					<p>
						<b>Company:</b> <span th:text="${job.company}"></span>
					</p>
					<p>
						<b>Location:</b> <span th:text="${job.location}"></span>
					</p>

					<div
						th:if="${!@applicationService.alreadyApplied(session.loggedUser, job)}">
						<a th:href="@{'/apply/' + ${job.id}}"
							class="btn btn-primary btn-sm"> Apply </a>
					</div>

					<div
						th:if="${@applicationService.alreadyApplied(session.loggedUser, job)}">
						<button class="btn btn-success btn-sm" disabled>Applied</button>
					</div>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
