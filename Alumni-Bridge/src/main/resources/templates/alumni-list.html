<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Alumni Directory</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
}

.card {
	border-radius: 12px;
	border: none;
	transition: 0.3s;
}

.card:hover {
	transform: translateY(-5px);
}
</style>
</head>

<body>

	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container" style="margin-top: 90px;">

		<h2 class="text-center mb-4">👥 Alumni Directory</h2>

		<form method="get" action="/alumni" class="row g-3 mb-4">

			<div class="col-md-5">
				<input type="text" name="keyword" class="form-control"
					placeholder="Search by name...">
			</div>

			<div class="col-md-3">
				<select name="role" class="form-select">
					<option value="">All Roles</option>
					<option value="STUDENT">Student</option>
					<option value="ALUMNI">Alumni</option>
				</select>
			</div>

			<div class="col-md-2">
				<button class="btn btn-primary w-100">Search</button>
			</div>

			<div class="col-md-2">
				<a href="/alumni" class="btn btn-secondary w-100">Reset</a>
			</div>

		</form>

		<div class="row">

			<div class="col-md-4 mb-4" th:each="user : ${users}">
				<div class="card shadow p-3">

					<h5 th:text="${user.name}"></h5>
					<p class="text-muted" th:text="${user.email}"></p>

					<span class="badge bg-secondary mb-2" th:text="${user.role}"></span>

					<a th:href="@{'/view-user/' + ${user.id}}"
						class="btn btn-outline-primary btn-sm"> View Profile </a>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
