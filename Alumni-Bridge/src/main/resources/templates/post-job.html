<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Post Job</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body>

	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container" style="margin-top: 90px;">

		<h2 class="mb-4 text-center">Post Job</h2>

		<form th:action="@{/save-job}" method="post" th:object="${job}">

			<input type="text" class="form-control mb-2" placeholder="Title"
				th:field="*{title}"> <input type="text"
				class="form-control mb-2" placeholder="Company"
				th:field="*{company}"> <input type="text"
				class="form-control mb-2" placeholder="Location"
				th:field="*{location}">
			<textarea class="form-control mb-2" rows="4"
				placeholder="Enter detailed job description..."
				th:field="*{description}"></textarea>

			<button class="btn btn-success">Post</button>

		</form>

	</div>

</body>
</html>
