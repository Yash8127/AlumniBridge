<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Events</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
	padding-top: 70px;
}

.card {
	border-radius: 12px;
	transition: 0.3s;
	height: 100%; /* 🔥 equal height */
	display: flex;
	flex-direction: column;
	justify-content: space-between;
}

/* limit long names */
.truncate {
	display: inline-block;
	max-width: 150px; /* adjust if needed */
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	vertical-align: bottom;
}

.card:hover {
	transform: translateY(-5px);
}
</style>
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container">

		<div class="d-flex justify-content-between mb-4">
			<h3>📅 Events</h3>
			<a
				th:if="${session.loggedUser.role == 'ALUMNI' or session.loggedUser.role == 'ADMIN'}"
				href="/create-event" class="btn btn-primary"> + Create Event </a>
		</div>

		<div class="row g-4">

			<div class="col-md-4" th:each="event : ${events}">
				<div class="card shadow p-3">

					<h5 th:text="${event.title}"></h5>

					<p class="text-muted" th:text="${event.description}"></p>

					<p>
						📍 <span th:text="${event.location}"></span><br> 📅 <span
							th:text="${event.date}"></span>

					</p>
					<p class="text-muted">
						👤 Created by: <a
							th:href="@{'/view-user/' + ${event.createdBy.id}}"
							class="text-decoration-none fw-bold"> <span
							th:text="${event.createdBy.name}" class="truncate"
							th:title="${event.createdBy.name}"></span>
						</a>
					</p>
					<div
						th:if="${!eventService.isRegistered(session.loggedUser, event)}">
						<a th:href="@{'/register-event/' + ${event.id}}"
							class="btn btn-success w-100"> Register </a>
					</div>

					<div
						th:if="${eventService.isRegistered(session.loggedUser, event)}">
						<button class="btn btn-secondary w-100" disabled>✔
							Registered</button>
					</div>

				</div>
			</div>

		</div>

	</div>

</body>
</html>
