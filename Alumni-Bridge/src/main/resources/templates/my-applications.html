<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Applications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            padding-top: 70px;
        }

        .card {
            border-radius: 12px;
            border: none;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .status-badge {
            font-size: 0.85rem;
            padding: 5px 10px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR FRAGMENT -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2>📄 My Applications</h2>
        <p class="text-muted">Track all your applied jobs</p>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(apps)}" class="text-center mt-5">
        <h5>No applications yet 😔</h5>
        <p>Start applying for jobs to see them here</p>
        <a href="/jobs" class="btn btn-primary">Explore Jobs</a>
    </div>

    <!-- APPLICATION CARDS -->
    <div class="row g-4">

        <div class="col-md-4" th:each="app : ${apps}">
            <div class="card shadow p-4">

                <h5 class="fw-bold" th:text="${app.job.title}"></h5>

                <p class="text-muted mb-1" th:text="${app.job.company}"></p>
                <p class="text-muted small" th:text="${app.job.location}"></p>

                <hr>

                <div class="d-flex justify-content-between align-items-center">

                    <span class="badge bg-success status-badge"
                          th:text="${app.status}">
                    </span>

                    <small class="text-muted">Applied</small>

                </div>

            </div>
        </div>

    </div>

</div>

<!-- ✅ REQUIRED FOR NAVBAR TOGGLE -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
