<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Sign Up | Alumni Bridge</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	font-family: 'Segoe UI', sans-serif;
	background:
		url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')
		no-repeat center center/cover;
}

/* overlay */
.overlay {
	position: fixed;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.6);
}

/* card */
.auth-card {
	border-radius: 15px;
	border: none;
	backdrop-filter: blur(12px);
	background: rgba(255, 255, 255, 0.1);
	color: white;
}

/* input */
.form-control, .form-select {
	border-radius: 10px;
	background: rgba(255, 255, 255, 0.2);
	color: white;
	border: none;
}

.form-control::placeholder {
	color: #ddd;
}

/* button */
.btn-auth {
	border-radius: 20px;
}

/* link */
.link {
	color: #fff;
	text-decoration: none;
}

.link:hover {
	text-decoration: underline;
}
</style>

</head>

<body>

	<div class="overlay"></div>

	<div
		class="container d-flex justify-content-center align-items-center vh-100">

		<div class="col-md-5">

			<div class="card shadow-lg auth-card p-4">


				<h4 class="text-center mb-2">
					<a href="/" style="text-decoration: none; color: white;"> 🎓
						Alumni Bridge </a>
				</h4>
				<p class="text-center text-light">Create your account</p>

				<!-- ✅ USE th:object -->
				<form th:action="@{/register}" th:object="${user}" method="post">

					<input type="text" th:field="*{name}" class="form-control mb-3"
						placeholder="Full Name" required> <small
						class="text-danger" th:errors="*{name}"></small> <input
						type="email" th:field="*{email}" class="form-control mb-3"
						placeholder="Email" required> <small class="text-danger"
						th:errors="*{email}"></small>
					<div class="mb-3 position-relative">
						<input type="password" id="password" name="password"
							class="form-control" placeholder="Password" required> <span
							onclick="togglePassword()"
							style="position: absolute; right: 15px; top: 10px; cursor: pointer;">
							👁️ </span>
					</div>
					<small class="text-danger" th:errors="*{password}"></small> <select
						class="form-select mb-3" th:field="*{role}">
						<option value="STUDENT">🎓 Student</option>
						<option value="ALUMNI">👨‍💼 Alumni</option>
					</select>

					<button class="btn btn-primary w-100 btn-auth">Sign Up</button>

				</form>

				<p class="text-center mt-3">
					Already have an account? <a href="/login" class="link fw-bold">Sign
						In</a>
				</p>
				<div class="text-center mt-2">
					<a href="/" class="btn btn-outline-light btn-sm">🏠 Home</a>
				</div>

			</div>

		</div>

	</div>
	<script>
		function togglePassword() {
			let input = document.getElementById("password");
			input.type = input.type === "password" ? "text" : "password";
		}
	</script>
</body>
</html>
