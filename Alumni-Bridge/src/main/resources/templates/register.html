<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Register | Alumni Bridge</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: linear-gradient(to right, #667eea, #764ba2);
}

.card {
	border-radius: 15px;
}
</style>
</head>

<body>

	<div
		class="container d-flex justify-content-center align-items-center vh-100">
		<div class="col-md-5">

			<div class="card shadow-lg">

				<div class="card-header text-center bg-primary text-white">
					<h4>🎓 Alumni Bridge</h4>
					<small>Create your account</small>
				</div>

				<div class="card-body">

					<form th:action="@{/register}" th:object="${user}" method="post">

						<div class="mb-3">
							<label>Name</label> <input type="text" class="form-control"
								th:field="*{name}" placeholder="Enter your name"> <small
								class="text-danger" th:errors="*{name}"></small>
						</div>

						<div class="mb-3">
							<label>Email</label> <input type="email" class="form-control"
								th:field="*{email}" placeholder="Enter your email"> <small
								class="text-danger" th:errors="*{email}"></small>
						</div>

						<div class="mb-3">
							<label>Password</label> <input type="password"
								class="form-control" th:field="*{password}"
								placeholder="Enter password"> <small class="text-danger"
								th:errors="*{password}"></small>
						</div>

						<div class="mb-3">
							<label>Role</label> <select class="form-select"
								th:field="*{role}">
								<option value="STUDENT">Student</option>
								<option value="ALUMNI">Alumni</option>
							</select>
						</div>

						<button class="btn btn-primary w-100">Register</button>

					</form>

					<p class="text-center mt-3">
						Already have an account? <a href="/login"
							class="fw-bold text-decoration-none">Login</a>
					</p>

				</div>

			</div>

		</div>
	</div>

</body>
</html>
